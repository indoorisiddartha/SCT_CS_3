<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Assessment Tool</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 0.5px;
            color: #38bdf8;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 14px 45px 14px 16px;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: #38bdf8;
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 14px;
            user-select: none;
        }

        .toggle-btn:hover {
            color: #38bdf8;
        }

        /* Strength Meter Bar */
        .strength-container {
            margin-bottom: 25px;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #94a3b8;
        }

        #strength-text {
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .meter-bar-bg {
            background: #334155;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .meter-bar-fill {
            height: 100%;
            width: 0%;
            background: #ef4444;
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        /* Criteria Checklist */
        .criteria-list {
            list-style: none;
        }

        .criterion {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #94a3b8;
            transition: color 0.3s ease;
        }

        .criterion.valid {
            color: #34d399;
        }

        .icon {
            margin-right: 10px;
            font-weight: bold;
            display: inline-block;
            width: 16px;
            text-align: center;
        }

        .criterion.valid .icon::before {
            content: "✓";
        }

        .criterion:not(.valid) .icon::before {
            content: "○";
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Password Strength Evaluator</h2>
        
        <div class="input-group">
            <input type="password" id="password-input" placeholder="Enter your password...">
            <button class="toggle-btn" id="toggle-visibility">Show</button>
        </div>

        <div class="strength-container">
            <div class="meter-label">
                <span>Strength:</span>
                <span id="strength-text">Very Weak</span>
            </div>
            <div class="meter-bar-bg">
                <div class="meter-bar-fill" id="meter-fill"></div>
            </div>
        </div>

        <ul class="criteria-list">
            <li class="criterion" id="crit-length"><span class="icon"></span>At least 8 characters</li>
            <li class="criterion" id="crit-upper"><span class="icon"></span>Uppercase letter (A-Z)</li>
            <li class="criterion" id="crit-lower"><span class="icon"></span>Lowercase letter (a-z)</li>
            <li class="criterion" id="crit-number"><span class="icon"></span>Number (0-9)</li>
            <li class="criterion" id="crit-special"><span class="icon"></span>Special character (!@#$%^&*)</li>
        </ul>
    </div>

    <script>
        const passwordInput = document.getElementById('password-input');
        const toggleVisibility = document.getElementById('toggle-visibility');
        const meterFill = document.getElementById('meter-fill');
        const strengthText = document.getElementById('strength-text');

        const crits = {
            length: document.getElementById('crit-length'),
            upper: document.getElementById('crit-upper'),
            lower: document.getElementById('crit-lower'),
            number: document.getElementById('crit-number'),
            special: document.getElementById('crit-special')
        };

        // Toggle Password Visibility
        toggleVisibility.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleVisibility.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                toggleVisibility.textContent = 'Show';
            }
        });

        // Real-time evaluation
        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;

            // Define rule matches
            const checks = {
                length: val.length >= 8,
                upper: /[A-Z]/.test(val),
                lower: /[a-z]/.test(val),
                number: /[0-9]/.test(val),
                special: /[^A-Za-z0-9]/.test(val)
            };

            // Update individual checklist UI items
            let score = 0;
            for (const key in checks) {
                if (checks[key]) {
                    crits[key].classList.add('valid');
                    score++;
                } else {
                    crits[key].classList.remove('valid');
                }
            }

            // Handle UI Updates for the overall Strength Bar
            if (val.length === 0) {
                meterFill.style.width = '0%';
                meterFill.style.backgroundColor = '#ef4444';
                strengthText.textContent = 'Very Weak';
                strengthText.style.color = '#94a3b8';
            } else {
                // Percentage representation
                const percentage = (score / 5) * 100;
                meterFill.style.width = `${percentage}%`;

                // Update text and colors dynamically based on structural score
                if (score <= 2) {
                    meterFill.style.backgroundColor = '#ef4444'; // Red
                    strengthText.textContent = 'Weak';
                    strengthText.style.color = '#ef4444';
                } else if (score <= 4) {
                    meterFill.style.backgroundColor = '#f59e0b'; // Orange/Yellow
                    strengthText.textContent = 'Medium';
                    strengthText.style.color = '#f59e0b';
                } else {
                    meterFill.style.backgroundColor = '#10b981'; // Green
                    strengthText.textContent = 'Strong';
                    strengthText.style.color = '#10b981';
                }
            }
        });
    </script>
</body>
</html>
